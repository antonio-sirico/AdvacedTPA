# /tpahere Messages (Target goes to Sender)
tpahere-usage: "&cUsage: /tpahere <player>"
tpahere-sent: "&aYou asked &e%player% &ato come to you."
tpahere-received: "&e%player% &awants you to teleport to them."

# Clickable Button System
accept-button: "&a&l✔ ACCEPT"
deny-button: "&c&l✖ DENY"
accept-hover: "&7(/tpaccept)"
deny-hover: "&7(/tpadeny)"

# Teleport Outcomes
teleport-countdown: "&aTeleporting in &e%seconds% &aseconds... do not move!"
