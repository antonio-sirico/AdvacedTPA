teleport-success: "&aTeleport successful!"
teleporting: "&aTeleporting to &e%player%&a..."
request-denied-target: "&cYou denied &e%player%&c's request."
request-denied-sender: "&e%player% &chased denied your request."

# Expiration
request-expired-sender: "&cYour request has expired."
