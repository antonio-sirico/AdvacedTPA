name: AdvancedTPA
version: 1.2.1
main: me.siryq.advancedtpa.AdvancedTPA
api-version: '1.21'
author: Antonio
description: Un plugin di teletrasporto avanzato con particelle, suoni e messaggi cliccabili.

commands:
  tpa:
    description: Invia una richiesta di teletrasporto a un giocatore.
    usage: /tpa <giocatore>
    permission: advancedtpa.tpa
  tpahere:
    description: Chiedi a un giocatore di teletrasportarsi da te.
    usage: /tpahere <giocatore>
    permission: advancedtpa.tpahere
  tpaccept:
    description: Accetta una richiesta di teletrasporto in sospeso.
    usage: /tpaccept
    permission: advancedtpa.tpaccept
  tpadeny:
    description: Rifiuta una richiesta di teletrasporto in sospeso.
    usage: /tpadeny
    permission: advancedtpa.tpadeny
  tpareload:
    description: Ricarica la configurazione e i messaggi del plugin.
    usage: /tpareload
    permission: advancedtpa.admin
  sethome:
    description: Imposta una casa.
    usage: /sethome <nomecasa>
    permission: advancedtpa.sethome
  home:
    description: Teletrasportati a una casa o al letto.
    usage: /home <nomecasa>
    permission: advancedtpa.home
  delhome:
    description: Elimina una casa salvata.
    usage: /delhome <nomecasa>
    permission: advancedtpa.delhome

permissions:
  advancedtpa.tpa:
    description: Permette di usare il comando /tpa.
    default: true
  advancedtpa.tpahere:
    description: Permette di usare il comando /tpahere.
    default: true
  advancedtpa.tpaccept:
    description: Permette di accettare le richieste di TPA.
    default: true
  advancedtpa.tpadeny:
    description: Permette di rifiutare le richieste di TPA.
    default: true
  advancedtpa.sethome:
    description: Permette di settare una casa.
    default: true
  advancedtpa.home:
    description: Permette di usare le proprie case.
    default: true
  advancedtpa.delhome:
    description: Permette di eliminare le proprie case.
    default: true
  advancedtpa.homebed:
    description: Permette di teletrasportarsi al letto.
    default: op
  advancedtpa.bypassdelay:
    description: Permette di teletrasportarsi istantaneamente.
    default: op
  advancedtpa.admin:
    description: Permette di ricaricare il plugin e gestire le impostazioni.
    default: op